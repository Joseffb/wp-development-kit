name: CI

on:
  push:
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP
        run: composer lint

      - name: Run test suites
        run: composer test

  wp-env:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Start wp-env
        run: npm run wp-env:start

      - name: Verify wp-env CLI
        run: npm run wp-env:cli

      - name: Verify wp-env test CLI
        run: npm run wp-env:test-cli

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop
